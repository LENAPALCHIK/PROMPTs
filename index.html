<style>
:root{--bg:#1e1c1a;--card:#272421;--border:#3a3632;--gold:#c9a84c;--gold-l:#e8c97a;--text:#e0dbd4;--muted:#7a7570;--green:#4caf7a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;}
header{padding:36px 32px 20px;border-bottom:1px solid var(--border);max-width:960px;margin:0 auto;}
header h1{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--gold-l);margin-bottom:5px;}
header p{color:var(--muted);font-size:0.82rem;}
.tabs-box{max-width:960px;margin:20px auto 0;padding:0 32px;}
.tabs{display:flex;gap:4px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:20px;font-size:0.85rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Raleway',sans-serif;}
.tab.active{background:#1a1610;border-color:var(--gold);color:var(--gold-l);font-weight:500;}
.tabs2{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.tab2{padding:6px 12px;border-radius:20px;font-size:0.78rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Raleway',sans-serif;}
.tab2.active2{background:#1a1610;border-color:var(--gold);color:var(--gold-l);font-weight:500;}
.toolbar{max-width:960px;margin:16px auto 0;padding:0 32px;display:flex;gap:10px;}
.search{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-family:'Raleway',sans-serif;font-size:0.88rem;outline:none;}
.search:focus{border-color:var(--gold);}
.search::placeholder{color:var(--muted);}
.btn-rand{background:#1a1610;border:1px solid var(--gold);border-radius:6px;padding:10px 16px;color:var(--gold-l);font-family:'Raleway',sans-serif;font-size:0.82rem;cursor:pointer;}
.stats{max-width:960px;margin:10px auto 0;padding:0 32px;color:var(--muted);font-size:0.78rem;}
main{max-width:960px;margin:0 auto;padding:20px 32px 80px;}
.cat{margin-bottom:36px;}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);cursor:pointer;}
.cat-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold-l);}
.cat-cnt{margin-left:auto;font-size:0.72rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:20px;border:1px solid var(--border);}
.cat-arr{font-size:0.78rem;color:var(--muted);margin-left:4px;}
.cat.collapsed .grid{display:none;}
.grid{display:flex;flex-direction:column;gap:6px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;position:relative;}
.card:hover{border-color:var(--gold);background:#1c1c1c;}
.card.copied{border-color:var(--green)!important;background:#0f1a13!important;}
.ru{font-size:0.85rem;color:var(--gold-l);font-weight:500;margin-bottom:3px;}
.num{font-size:0.65rem;color:var(--muted);margin-bottom:3px;}
.en{font-size:0.78rem;line-height:1.55;color:#999;}
.meta{margin:6px 0 4px;display:flex;flex-direction:column;gap:2px;}
.meta-row{font-size:0.75rem;color:#7a7570;}
.meta-label{color:#c9a84c;font-weight:500;}
.badge{font-size:0.65rem;padding:1px 7px;border-radius:10px;background:#2a2a1a;border:1px solid var(--border);color:var(--muted);margin-right:6px;}
.hint{position:absolute;top:9px;right:12px;font-size:0.65rem;color:var(--muted);opacity:0;transition:opacity 0.2s;pointer-events:none;background:var(--card);padding:2px 6px;border-radius:4px;}
.card:hover .hint{opacity:1;}
.ok{position:absolute;top:9px;right:12px;font-size:0.65rem;color:var(--green);display:none;}
.card.copied .ok{display:block;}
.card.copied .hint{display:none;}
.modal-ov{position:fixed;inset:0;background:#000;z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-ov.show{display:flex;}
.modal{background:#2a2724;border:1px solid #4a4440;border-radius:12px;padding:24px;max-width:580px;width:100%;position:relative;}
.m-cat{font-family:'Playfair Display',serif;color:var(--gold-l);font-size:1rem;margin-bottom:3px;}
.m-season{font-size:0.78rem;color:var(--muted);margin-bottom:8px;}
.m-ru{font-size:1rem;color:var(--gold-l);margin-bottom:10px;}
.m-txt{font-size:0.95rem;color:#c8c4bc;line-height:1.55;margin-bottom:14px;word-break:break-word;}
.m-btns{display:flex;gap:8px;flex-wrap:wrap;}
.m-btn{padding:9px 16px;border-radius:5px;font-size:0.85rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;}
.m-btn.primary{background:#1a1610;border-color:var(--gold);color:var(--gold-l);}
.m-meta{display:flex;flex-direction:column;gap:3px;margin:8px 0 10px;padding:10px 12px;background:#1e1c1a;border-radius:6px;border:1px solid var(--border);}
.m-meta-row{font-size:0.82rem;color:#7a7570;}
.m-meta-row span{color:#c9a84c;font-weight:500;}
.m-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;}
</style>
</head>

function buildCatTabs(){
  var tabs2=document.getElementById("tabs2");
  if(!tabs2)return;
  tabs2.innerHTML="";
  // All button
  var all=document.createElement("button");
  all.className="tab2"+(curCat===null?" active2":"");
  all.textContent="Все категории";
  all.onclick=function(){
    curCat=null;
    document.querySelectorAll(".tab2").forEach(b=>b.classList.remove("active2"));
    all.classList.add("active2");
    applyFilters();
  };
  tabs2.appendChild(all);
  // Category buttons
  data.forEach(function(cat){
    var t=document.createElement("button");
    t.className="tab2"+(curCat===cat.id?" active2":"");
    t.textContent=cat.icon+" "+cat.title;
    (function(id,btn){t.onclick=function(){
      curCat=id;
      document.querySelectorAll(".tab2").forEach(b=>b.classList.remove("active2"));
      btn.classList.add("active2");
      applyFilters();
    };})(cat.id,t);
    tabs2.appendChild(t);
  });
}

function applyFilters(){
  var q=document.getElementById("search").value.toLowerCase();
  var key=TAB_KEYS[cur];
  cards.forEach(function(c){
    var matchQ=!q||(c._ru+c._full).toLowerCase().includes(q);
    var matchCat=!curCat||c._catId===curCat;
    var matchSeason=true;
    if(key){
      if(cur==="🏠 Универсальные") matchSeason=(c._s==="универсальные");
      else matchSeason=(c._s===key);
    }
    c.style.display=(matchQ&&matchCat&&matchSeason)?"":"none";
  });
  document.querySelectorAll(".cat").forEach(function(cat){
    var any=[...cat.querySelectorAll(".card")].some(function(c){return c.style.display!=="none";});
    cat.style.display=any?"":"none";
  });
  updateStats();
}

document.getElementById("search").oninput=function(){applyFilters();};
document.getElementById("randBtn").onclick=showRandom;
function showRandom(){
  const vis=cards.filter(c=>c.style.display!=="none");
  if(!vis.length) return;
  mCard=vis[Math.floor(Math.random()*vis.length)];
  document.getElementById("mCat").textContent=mCard._cat;
  document.getElementById("mSeason").textContent=SL[mCard._s]||"";
  document.getElementById("mRu").textContent=mCard._ru;
  // Build metadata same as card
  var metaEl=document.getElementById("mMeta");
  if(metaEl){
    var moodText=mCard._ru.indexOf('(улыбка)')!==-1?'улыбка 🙂':mCard._ru.indexOf('(задумчиво)')!==-1?'задумчивое 🤔':'нейтральное 😐';
    var seasonText=SL[mCard._s]||'—';
    metaEl.innerHTML=
      '<div class="m-meta-row"><span>Время года:</span> '+seasonText+'</div>'+
      '<div class="m-meta-row"><span>Настроение:</span> '+moodText+'</div>'+
      (mCard._clothes?'<div class="m-meta-row"><span>Одежда:</span> '+mCard._clothes+'</div>':'')+
      (mCard._hair?'<div class="m-meta-row"><span>Причёска:</span> '+mCard._hair+'</div>':'');
  }
  document.getElementById("mTxt").textContent=mCard._full;
  document.getElementById("modal").classList.add("show");
}
function closeModal(){document.getElementById("modal").classList.remove("show");}
function copyModal(){
  if(!mCard) return;
  copy(mCard._full);
  const t=document.getElementById("mTxt");
  t.textContent="✓ Скопировано!";
  setTimeout(()=>{if(mCard)t.textContent=mCard._full;},1500);
}
build();
applyFilters();
